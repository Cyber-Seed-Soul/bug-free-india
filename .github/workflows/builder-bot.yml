name: "IssueOps Workspace Builder"

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Builder & Validator Script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const issue = github.event.issue;
            const actor = github.actor; 
            const body = issue.body || "";

            // 1. THE BULLETPROOF TRIGGER (Checks the Title instead of the Body)
            if (!issue.title || !issue.title.includes('[Workspace]')) {
              console.log("Not a workspace request form. Going back to sleep.");
              return;
            }

            console.log(`🚀 Workspace Form detected! Starting build for ${actor}...`);

            // 2. Aggressive Parsing Logic
            const extract = (label) => {
              // Looks for the label, captures everything until the next ### or the end of the string
              const regex = new RegExp(`### ${label}\\s*([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(regex);
              let val = match ? match[1].trim() : null;
              if (val === "_No response_") val = ""; // Clean GitHub's empty state
              return val;
            };

            const authorName = extract("Your Public Display Name");
            const authorEmail = extract("Your Public Contact Email");
            const slug = extract("Article URL Slug");
            const rawCategory = extract("Primary Category");
            const rawTags = extract("Tags \\(Comma Separated\\)");

            if (!authorName || !slug || !rawCategory || !rawTags) {
              await github.rest.issues.createComment({ 
                ...github.repo, 
                issue_number: issue.number, 
                body: `⚠️ **Error:** Missing required fields. The bot could not parse the form.` 
              });
              return;
            }

            // 3. JSON VALIDATION (Categories & Tags)
            let errors = [];

            // Validate Category
            try {
               const catJson = JSON.parse(fs.readFileSync('categories.json', 'utf8'));
               const validCats = Array.isArray(catJson) ? catJson : Object.keys(catJson);
               if (validCats.length > 0 && !validCats.includes(rawCategory)) {
                 errors.push(`Invalid Category: \`${rawCategory}\`. Valid options include: ${validCats.slice(0,5).join(', ')}...`);
               }
            } catch (e) { console.log("Warning: categories.json missing or invalid"); }

            // Validate Tags
            const inputTags = rawTags.split(',').map(t => t.trim()).filter(t => t);
            try {
               const tagsJson = JSON.parse(fs.readFileSync('tags.json', 'utf8'));
               const validTagsList = Array.isArray(tagsJson) ? tagsJson : Object.keys(tagsJson);
               if (validTagsList.length > 0) {
                 const invalidTags = inputTags.filter(t => !validTagsList.includes(t));
                 if (invalidTags.length > 0) {
                   errors.push(`Invalid Tags: \`${invalidTags.join(', ')}\`. Valid options include: ${validTagsList.slice(0,5).join(', ')}...`);
                 }
               }
            } catch (e) { console.log("Warning: tags.json missing or invalid"); }

            // 🛑 HALT IF VALIDATION FAILS
            if (errors.length > 0) {
                 await github.rest.issues.createComment({
                   ...github.repo,
                   issue_number: issue.number,
                   body: `⚠️ **Validation Failed!**\n\n- ${errors.join('\n- ')}\n\n**Action Required:** Please close this issue and open a new one with correct values from the database.`
                 });
                 return; // Stops the script before any folders are created
            }

            // 4. Shard Directory Calculation
            const shard = actor.substring(0, 1).toLowerCase();
            // Using a unique branch name so they don't commit directly to main
            const branchName = `workspace/${actor}/${slug}`;
            const uniquePath = `authors/${shard}/${actor}/${slug}/index.md`;
            
            const targetDir = path.dirname(uniquePath);
            fs.mkdirSync(targetDir, { recursive: true });

            // 5. Create the Markdown
            const dateStr = new Date().toISOString().split('T')[0];
            const tagsFormatted = inputTags.map(t => `"${t}"`).join(', ');
            // Clean the title for the markdown
            const cleanTitle = issue.title.replace(/\[Workspace\]:\s*/i, '').trim();

            const content = `---
            title: "${cleanTitle}"
            slug: "${slug}"
            author_name: "${authorName}"
            author_email: "${authorEmail}"
            github_username: "${actor}"
            category: "${rawCategory}"
            tags: [${tagsFormatted}]
            date: "${dateStr}"
            ---
            
            # ${cleanTitle}
            
            Write your content here. Add an image by dragging it into your file tree on the left and linking it like this: ![desc](./images/your-image.jpg)
            `;

            fs.writeFileSync(uniquePath, content.replace(/^\s+/gm, ''));

            // 6. Create Branch, Commit, and Push
            const exec = require('child_process').execSync;
            exec('git config user.name "Cyber Seed Soul Bot"');
            exec('git config user.email "bot@cyberseedsoul.in"');
            exec(`git checkout -b ${branchName}`);
            exec(`git add ${uniquePath}`);
            exec(`git commit -m "feat: auto-created workspace for ${actor}: ${slug}"`);
            exec(`git push origin ${branchName}`);

            // 7. Magic Link
            const magicLink = `https://github.dev/${github.context.repo.owner}/${github.context.repo.repo}/blob/${branchName}/${uniquePath}`;
            
            await github.rest.issues.createComment({
              ...github.repo,
              issue_number: issue.number,
              body: `✅ **Workspace Ready!**\n\nClick this magic link to write your article directly in your browser. You can drag and drop images into the file tree.\n\n🔗 [Start Writing Here](${magicLink})\n\n*(Note: When you are finished, commit your changes in the browser to automatically open a Pull Request!)*`
            });

            await github.rest.issues.update({ ...github.repo, issue_number: issue.number, state: 'closed' });