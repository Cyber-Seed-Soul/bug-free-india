name: "IssueOps Workspace Builder"

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue Number to process manually'
        required: true

permissions:
  contents: write
  issues: write

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Builder & Validator Script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let issue = context.eventName === 'workflow_dispatch' ? 
               (await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: parseInt(context.payload.inputs.issue_number) })).data : 
               context.payload.issue;

            if (!issue) return;

            const body = issue.body || "";

            if (!body.includes('### Your Public Display Name')) {
              return; // Not a workspace request
            }

            // 1. BULLETPROOF EXTRACTION LOGIC
            // Splits the markdown cleanly and ignores "(Optional)" and "_No response_"
            const parts = body.split('### ').map(p => p.trim()).filter(p => p);
            
            const getVal = (labelStart) => {
               const part = parts.find(p => p.startsWith(labelStart));
               if (!part) return "";
               // Remove the question label from the text
               let val = part.replace(labelStart, '').trim();
               // Clean up GitHub's artifacts
               if (val.startsWith('(Optional)')) val = val.replace('(Optional)', '').trim();
               if (val === '_No response_') return "";
               return val;
            };

            const authorName = getVal("Your Public Display Name");
            const authorEmail = getVal("Your Public Contact Email");
            const slug = getVal("Article URL Slug");
            const rawCategory = getVal("Primary Category");
            const rawTags = getVal("Tags (Comma Separated)");

            // 2. VALIDATION
            let errors = [];
            if (!authorName) errors.push("Missing **Public Display Name**.");
            if (!slug) errors.push("Missing **Article URL Slug**.");
            if (!rawCategory) errors.push("Missing **Primary Category**.");
            if (!rawTags) errors.push("Missing **Tags**.");

            if (rawCategory) {
              try {
                 const catJson = JSON.parse(fs.readFileSync('categories.json', 'utf8'));
                 const validCats = Array.isArray(catJson) ? catJson : Object.keys(catJson);
                 if (validCats.length > 0 && !validCats.includes(rawCategory)) {
                   errors.push(`Invalid Category: \`${rawCategory}\`. Options: ${validCats.join(', ')}`);
                 }
              } catch (e) {}
            }

            let inputTags = [];
            if (rawTags) {
              inputTags = rawTags.split(',').map(t => t.trim()).filter(t => t);
              try {
                 const tagsJson = JSON.parse(fs.readFileSync('tags.json', 'utf8'));
                 const validTagsList = Array.isArray(tagsJson) ? tagsJson : Object.keys(tagsJson);
                 if (validTagsList.length > 0) {
                   const invalidTags = inputTags.filter(t => !validTagsList.includes(t));
                   if (invalidTags.length > 0) {
                     errors.push(`Invalid Tags: \`${invalidTags.join(', ')}\`. Valid tags: ${validTagsList.join(', ')}`);
                   }
                 }
              } catch (e) {}
            }

            // 🛑 HALT IF ERRORS
            if (errors.length > 0) {
                 await github.rest.issues.createComment({
                   ...context.repo,
                   issue_number: issue.number,
                   body: `⚠️ **Workspace Request Denied**\n\nHi @${issue.user.login}, we couldn't create your workspace because of the following errors:\n\n- ${errors.join('\n- ')}\n\n**Next Steps:** This request has been automatically closed to keep the queue clean. Please open a new request with the corrected information.`
                 });
                 await github.rest.issues.update({ ...context.repo, issue_number: issue.number, state: 'closed', state_reason: 'not_planned' });
                 return; 
            }

            // 3. FILE CONSTRUCTION
            const actor = issue.user.login;
            const shard = actor.substring(0, 1).toLowerCase();
            const branchName = `workspace/${actor}/${slug}`;
            const uniquePath = `authors/${shard}/${actor}/${slug}/index.md`;
            const imageFolderPath = `authors/${shard}/${actor}/${slug}/images`; // THE IMAGE FOLDER
            
            // Create directories
            fs.mkdirSync(path.dirname(uniquePath), { recursive: true });
            fs.mkdirSync(imageFolderPath, { recursive: true });

            // Create .gitkeep to force the images folder to exist
            fs.writeFileSync(path.join(imageFolderPath, '.gitkeep'), '');

            const dateStr = new Date().toISOString().split('T')[0];
            const tagsFormatted = inputTags.map(t => `"${t}"`).join(', ');
            const cleanTitle = issue.title.replace(/\[Workspace\]:\s*/i, '').trim() || slug;

            const content = `---
            title: "${cleanTitle}"
            slug: "${slug}"
            author_name: "${authorName}"
            author_email: "${authorEmail}"
            github_username: "${actor}"
            category: "${rawCategory}"
            tags: [${tagsFormatted}]
            date: "${dateStr}"
            ---\n\n# ${cleanTitle}\n\nWrite your content here. Add an image by dragging it into your \`images\` folder on the left, and link it like this: \n\n![Image description](./images/your-image.jpg)\n`;

            // Write the index.md file
            fs.writeFileSync(uniquePath, content.replace(/^\s+/gm, ''));
            
            // 4. GIT OPERATIONS
            const runCmd = require('child_process').execSync;
            runCmd('git config user.name "Cyber Seed Soul Bot"');
            runCmd('git config user.email "bot@cyberseedsoul.in"');
            runCmd(`git checkout -b ${branchName}`);
            runCmd(`git add ${uniquePath}`);
            runCmd(`git add ${imageFolderPath}/.gitkeep`); // ADD THE IMAGES FOLDER TO GIT
            runCmd(`git commit -m "feat: auto-created workspace for ${actor}: ${slug}"`);
            runCmd(`git push origin ${branchName}`);

            // 5. MAGIC LINK & AUTHOR INSTRUCTIONS
            const magicLink = `https://github.dev/${context.repo.owner}/${context.repo.repo}/blob/${branchName}/${uniquePath}`;
            
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ **Workspace Ready!**\n\nHi @${actor}, your workspace is built. Click this magic link to write your article directly in your browser. You will see an \`images\` folder ready for your pictures.\n\n🔗 [**Click Here to Start Writing**](${magicLink})\n\n---\n### 📝 How to submit when you are finished:\n1. Click the **Source Control** icon on the far left menu (it looks like a branching tree ᛘ).\n2. Type a message like "Finished draft" in the box and click the blue **Commit & Push** button.\n3. A notification will pop up at the bottom right. Click **Create Pull Request** to send it to us for review!`
            });

            await github.rest.issues.update({ ...context.repo, issue_number: issue.number, state: 'closed' });