name: "IssueOps Workspace Builder"

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'workspace-request')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Builder Script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const issue = github.event.issue;
            const actor = github.actor; 
            console.log(`🚀 Starting workspace build for ${actor}...`);

            // 1. Parse the Issue Form
            const body = issue.body;
            const extract = (label) => {
              const regex = new RegExp(`### ${label}\\s+([\\s\\S]+?)(?:\\n### |$)`);
              const match = body.match(regex);
              return match ? match[1].trim() : null;
            };

            const authorName = extract("Your Public Display Name");
            const authorEmail = extract("Your Public Contact Email") || "";
            const slug = extract("Article URL Slug");
            const rawCategory = extract("Primary Category");
            const rawTags = extract("Tags \\(Comma Separated\\)");

            if (!authorName || !slug || !rawCategory || !rawTags) {
              await github.rest.issues.createComment({ ...github.repo, issue_number: issue.number, body: `⚠️ **Error:** Missing required fields.` });
              return;
            }

            // 2. JSON VALIDATION (Categories & Tags)
            let errors = [];

            // Validate Category
            try {
               const catJson = JSON.parse(fs.readFileSync('categories.json', 'utf8'));
               const validCats = Array.isArray(catJson) ? catJson : Object.keys(catJson);
               if (validCats.length > 0 && !validCats.includes(rawCategory)) {
                 errors.push(`Invalid Category: \`${rawCategory}\`. Valid options include: ${validCats.slice(0,5).join(', ')}...`);
               }
            } catch (e) { console.log("Skipping category validation (categories.json missing or invalid)"); }

            // Validate Tags
            const inputTags = rawTags.split(',').map(t => t.trim()).filter(t => t);
            try {
               const tagsJson = JSON.parse(fs.readFileSync('tags.json', 'utf8'));
               const validTagsList = Array.isArray(tagsJson) ? tagsJson : Object.keys(tagsJson);
               if (validTagsList.length > 0) {
                 const invalidTags = inputTags.filter(t => !validTagsList.includes(t));
                 if (invalidTags.length > 0) {
                   errors.push(`Invalid Tags: \`${invalidTags.join(', ')}\`.`);
                 }
               }
            } catch (e) { console.log("Skipping tag validation (tags.json missing or invalid)"); }

            // Halt if validation fails
            if (errors.length > 0) {
                 await github.rest.issues.createComment({
                   ...github.repo,
                   issue_number: issue.number,
                   body: `⚠️ **Validation Failed:**\n- ${errors.join('\n- ')}\n\nPlease close this issue and submit a new one with exact values from the database.`
                 });
                 return; 
            }

            // 3. Shard Directory Calculation
            const shard = actor.substring(0, 1).toLowerCase();
            const uniquePath = `authors/${shard}/${actor}/${slug}/index.md`;
            
            const targetDir = path.dirname(uniquePath);
            fs.mkdirSync(targetDir, { recursive: true });

            // 4. Create the Markdown
            const dateStr = new Date().toISOString().split('T')[0];
            const tagsFormatted = inputTags.map(t => `"${t}"`).join(', ');

            const content = `---
            title: "Replace with Article Title"
            slug: "${slug}"
            author_name: "${authorName}"
            author_email: "${authorEmail}"
            github_username: "${actor}"
            category: "${rawCategory}"
            tags: [${tagsFormatted}]
            date: "${dateStr}"
            ---
            
            # Your Article Title
            
            Write your content here. Add an image by dragging it into your folder and linking it like this: ![desc](./images/your-image.jpg)
            `;

            fs.writeFileSync(uniquePath, content.replace(/^\s+/gm, ''));

            // 5. Commit and Push
            const exec = require('child_process').execSync;
            exec('git config user.name "github-actions[bot]"');
            exec('git config user.email "github-actions[bot]@users.noreply.github.com"');
            exec(`git add ${uniquePath}`);
            exec(`git commit -m "feat: auto-created workspace for ${actor}: ${slug}"`);
            exec('git push origin main');

            // 6. Magic Link
            const magicLink = `https://github.dev/${github.context.repo.owner}/${github.context.repo.repo}/blob/main/${uniquePath}`;
            
            await github.rest.issues.createComment({
              ...github.repo,
              issue_number: issue.number,
              body: `✅ **Workspace Ready!**\n\nClick this magic link to write your article directly in your browser. You can drag and drop images into the file tree.\n\n🔗 [Start Writing Here](${magicLink})`
            });

            await github.rest.issues.update({ ...github.repo, issue_number: issue.number, state: 'closed' });