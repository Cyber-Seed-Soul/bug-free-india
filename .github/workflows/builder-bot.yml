name: "IssueOps Workspace Builder"

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue Number to process manually'
        required: true

permissions:
  contents: write
  issues: write

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CORE_SYNC_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Builder Script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let issue = context.eventName === 'workflow_dispatch' ? 
               (await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: parseInt(context.payload.inputs.issue_number) })).data : 
               context.payload.issue;

            if (!issue) return;

            const body = issue.body || "";
            if (!body.includes('### Your Public Display Name')) return;

            const parts = body.split('### ').map(p => p.trim()).filter(p => p);
            const getVal = (labelStart) => {
               const part = parts.find(p => p.startsWith(labelStart));
               if (!part) return "";
               let val = part.replace(labelStart, '').trim();
               if (val.startsWith('(Optional)')) val = val.replace('(Optional)', '').trim();
               if (val === '_No response_') return "";
               return val;
            };

            const authorName = getVal("Your Public Display Name");
            const authorEmail = getVal("Your Public Contact Email");
            const slug = getVal("Article URL Slug");
            const rawCategory = getVal("Primary Category");
            const rawTags = getVal("Tags (Comma Separated)");

            if (!authorName || !slug || !rawCategory || !rawTags) {
                 await github.rest.issues.createComment({
                   ...context.repo, issue_number: issue.number,
                   body: `⚠️ **Workspace Request Denied:** Missing required fields. Please open a new request.`
                 });
                 await github.rest.issues.update({ ...context.repo, issue_number: issue.number, state: 'closed', state_reason: 'not_planned' });
                 return; 
            }

            const actor = issue.user.login;
            const shard = actor.substring(0, 1).toLowerCase();
            const safeSlug = slug.replace(/[^a-zA-Z0-9-]/g, '-').toLowerCase(); 
            const uniquePath = `authors/${shard}/${actor}/${safeSlug}/index.md`;
            
            fs.mkdirSync(path.dirname(uniquePath), { recursive: true });

            const dateStr = new Date().toISOString().split('T')[0];
            const tagsArray = rawTags ? rawTags.split(',').map(t => t.trim()).filter(t => t) : [];
            const tagsFormatted = tagsArray.map(t => `"${t}"`).join(', ');
            const cleanTitle = issue.title.replace(/\[Workspace\]:\s*/i, '').trim() || safeSlug;

            const content = `---
            title: "${cleanTitle}"
            slug: "${safeSlug}"
            author: "${authorName}"
            author_email: "${authorEmail}"
            github_username: "${actor}"
            issue_number: ${issue.number}
            category: "${rawCategory}"
            tags: [${tagsFormatted}]
            pubDatetime: "${dateStr}"
            draft: true
            description: "An insightful article written by ${authorName}."
            ---\n\n# ${cleanTitle}\n\nWrite your content here. \n\n**To add an image, simply drag and drop it from your computer directly into this text box!**\n`;

            fs.writeFileSync(uniquePath, content.replace(/^\s+/gm, ''));
            
            // STRICT MAIN-BRANCH COMMIT
            const runCmd = require('child_process').execSync;
            runCmd('git config user.name "Cyber Seed Soul Bot"');
            runCmd('git config user.email "bot@cyberseedsoul.in"');
            runCmd(`git add ${uniquePath}`);
            runCmd(`git commit -m "feat: auto-created draft template for ${actor}: ${safeSlug}"`);
            runCmd(`git pull origin main --rebase`);
            runCmd(`git push origin main`);

            const magicLink = `https://github.com/${context.repo.owner}/${context.repo.repo}/edit/main/${uniquePath}`;
            
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ **Workspace Ready!**\n\nHi @${actor}, your writing environment is prepared. \n\n🔗 [**Click Here to Start Writing**](${magicLink})\n\n---\n### 📝 Instructions:\n1. Click the link above. \n2. Click the green **Fork this repository** button (if asked).\n3. Write your article! You can drag and drop images directly into the text box.\n4. When finished, click the green **Commit changes...** button at the top right.\n5. Click **Create Pull Request** to send it to us for review!`
            });

            try { await github.rest.issues.addLabels({ ...context.repo, issue_number: issue.number, labels: ['in-progress'] }); } catch (e) {}