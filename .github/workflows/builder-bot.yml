name: "IssueOps Workspace Builder"

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue Number to process manually'
        required: true

permissions:
  contents: write
  issues: write

jobs:
  build-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Builder & Validator Script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log("=========================================");
            console.log("🚀 STARTING BUILDER BOT PIPELINE");
            console.log("=========================================");

            const fs = require('fs');
            const path = require('path');
            
            let issue = context.eventName === 'workflow_dispatch' ? 
               (await github.rest.issues.get({ owner: context.repo.owner, repo: context.repo.repo, issue_number: parseInt(context.payload.inputs.issue_number) })).data : 
               context.payload.issue;

            if (!issue) return console.log("❌ ERROR: No issue payload found.");

            const body = issue.body || "";

            // 1. THE BULLETPROOF TRIGGER
            // We only check if the body contains the form questions. We ignore the title completely!
            if (!body.includes('### Your Public Display Name')) {
              console.log("❌ ABORT: Not a workspace request form. Going back to sleep.");
              return;
            }

            console.log(`-> Processing Workspace Request #${issue.number} by ${issue.user.login}`);

            // 2. Extraction Logic
            const extract = (label) => {
              const regex = new RegExp(`### ${label}\\s*([\\s\\S]*?)(?=\\n### |$)`);
              const match = body.match(regex);
              let val = match ? match[1].trim() : null;
              if (val === "_No response_") val = ""; 
              return val;
            };

            const authorName = extract("Your Public Display Name");
            const authorEmail = extract("Your Public Contact Email");
            const slug = extract("Article URL Slug");
            const rawCategory = extract("Primary Category");
            const rawTags = extract("Tags \\(Comma Separated\\)");

            // 3. Collect ALL Errors for Feedback
            let errors = [];

            if (!authorName) errors.push("Missing **Public Display Name**.");
            if (!slug) errors.push("Missing **Article URL Slug**.");
            if (!rawCategory) errors.push("Missing **Primary Category**.");
            if (!rawTags) errors.push("Missing **Tags**.");

            // Validate Category
            if (rawCategory) {
              try {
                 const catJson = JSON.parse(fs.readFileSync('categories.json', 'utf8'));
                 const validCats = Array.isArray(catJson) ? catJson : Object.keys(catJson);
                 if (validCats.length > 0 && !validCats.includes(rawCategory)) {
                   errors.push(`Invalid Category: \`${rawCategory}\`. Options: ${validCats.join(', ')}`);
                 }
              } catch (e) { console.log("Warning: categories.json missing"); }
            }

            // Validate Tags
            let inputTags = [];
            if (rawTags) {
              inputTags = rawTags.split(',').map(t => t.trim()).filter(t => t);
              try {
                 const tagsJson = JSON.parse(fs.readFileSync('tags.json', 'utf8'));
                 const validTagsList = Array.isArray(tagsJson) ? tagsJson : Object.keys(tagsJson);
                 if (validTagsList.length > 0) {
                   const invalidTags = inputTags.filter(t => !validTagsList.includes(t));
                   if (invalidTags.length > 0) {
                     errors.push(`Invalid Tags: \`${invalidTags.join(', ')}\`. Valid tags: ${validTagsList.join(', ')}`);
                   }
                 }
              } catch (e) { console.log("Warning: tags.json missing"); }
            }

            // 🛑 HALT, FEEDBACK, AND AUTO-CLOSE IF VALIDATION FAILS
            if (errors.length > 0) {
                 console.log("❌ Validation failed. Leaving feedback and closing issue.");
                 
                 await github.rest.issues.createComment({
                   ...context.repo,
                   issue_number: issue.number,
                   body: `⚠️ **Workspace Request Denied**\n\nHi @${issue.user.login}, we couldn't create your workspace because of the following errors:\n\n- ${errors.join('\n- ')}\n\n**Next Steps:** This request has been automatically closed to keep the queue clean. Please open a new request with the corrected information.`
                 });

                 await github.rest.issues.update({
                   ...context.repo,
                   issue_number: issue.number,
                   state: 'closed',
                   state_reason: 'not_planned'
                 });
                 return; 
            }

            console.log("✅ All validations passed! Building workspace...");
            
            // 4. File Construction
            const actor = issue.user.login;
            const shard = actor.substring(0, 1).toLowerCase();
            const branchName = `workspace/${actor}/${slug}`;
            const uniquePath = `authors/${shard}/${actor}/${slug}/index.md`;
            
            const targetDir = path.dirname(uniquePath);
            fs.mkdirSync(targetDir, { recursive: true });

            const dateStr = new Date().toISOString().split('T')[0];
            const tagsFormatted = inputTags.map(t => `"${t}"`).join(', ');
            const cleanTitle = issue.title.replace(/\[Workspace\]:\s*/i, '').trim() || slug;

            const content = `---
            title: "${cleanTitle}"
            slug: "${slug}"
            author_name: "${authorName}"
            author_email: "${authorEmail}"
            github_username: "${actor}"
            category: "${rawCategory}"
            tags: [${tagsFormatted}]
            date: "${dateStr}"
            ---\n\n# ${cleanTitle}\n\nWrite your content here. Add an image by dragging it into your file tree on the left and linking it like this: ![desc](./images/your-image.jpg)\n`;

            fs.writeFileSync(uniquePath, content.replace(/^\s+/gm, ''));
            
            // 5. Git Operations
            const runCmd = require('child_process').execSync;
            runCmd('git config user.name "Cyber Seed Soul Bot"');
            runCmd('git config user.email "bot@cyberseedsoul.in"');
            runCmd(`git checkout -b ${branchName}`);
            runCmd(`git add ${uniquePath}`);
            runCmd(`git commit -m "feat: auto-created workspace for ${actor}: ${slug}"`);
            runCmd(`git push origin ${branchName}`);

            // 6. Magic Link & Auto-Close Success
            const magicLink = `https://github.dev/${context.repo.owner}/${context.repo.repo}/blob/${branchName}/${uniquePath}`;
            
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `✅ **Workspace Ready!**\n\nHi @${actor}, your workspace is built. Click this magic link to write your article directly in your browser. You can drag and drop images into the file tree.\n\n🔗 [Start Writing Here](${magicLink})\n\n*(Note: When you are finished, commit your changes in the browser to automatically open a Pull Request!)*`
            });

            await github.rest.issues.update({ ...context.repo, issue_number: issue.number, state: 'closed' });