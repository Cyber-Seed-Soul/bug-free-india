name: Publish Approved Submissions to Strapi CMS

on:
  push:
    branches:
      - main
    paths:
      - 'authors/**.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install form-data gray-matter

      - name: Run Publisher Bot
        env:
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_WRITE_TOKEN: ${{ secrets.STRAPI_WRITE_TOKEN }}
        run: node publish.js

      - name: Trigger Frontend Rebuild in cyberseedsoul-core
        run: |
          curl -X POST https://api.github.com/repos/Cyber-Seed-Soul/cyberseedsoul-core/actions/workflows/deploy.yml/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.ORG_ADMIN_TOKEN }}" \
          -d '{"ref":"main"}'