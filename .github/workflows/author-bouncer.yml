name: "GitOps Bouncer (Schema Validator)"

on:
  pull_request:
    paths:
      - 'authors/**'
  push:
    branches:
      - main
    paths:
      - 'authors/**'

jobs:
  validate-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Gray-Matter Parser
        run: npm install gray-matter

      - name: Run Schema Bouncer
        run: node scripts/bouncer.js