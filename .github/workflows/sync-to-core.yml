name: Sync Articles & Close Loop

on:
  push:
    branches: [ main ]
    paths:
      - 'authors/**'

# THE FIX FOR THE 403 ERROR: Explicit Write Permissions
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  bridge-and-close:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Database Repo
        uses: actions/checkout@v4
        with:
          path: 'database-repo'

      - name: Checkout Frontend Astro Repo
        uses: actions/checkout@v4
        with:
          repository: 'Cyber-Seed-Soul/cyberseedsoul-core'
          token: ${{ secrets.CORE_SYNC_TOKEN }}
          path: 'frontend-repo'

      - name: Execute FOSS Bridge & Lifecycle Automation
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');

            console.log("🚀 STARTING FOSS SYNC AND LIFECYCLE BRIDGE...");

            // 1. MIRROR THE DATABASE TO ASTRO
            execSync('mkdir -p frontend-repo/src/data/blog/authors');
            execSync("rsync -av --exclude='_templates' database-repo/authors/ frontend-repo/src/data/blog/authors/");
            console.log("✅ Rsync complete.");

            // 2. GET EXACT FILES CHANGED IN THIS MERGE (API)
            const commit = await github.rest.repos.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });

            const changedFiles = commit.data.files.map(f => f.filename).filter(f => f.endsWith('index.md'));
            console.log("📝 Files changed in this merge:", changedFiles);

            let issuesToClose = new Set();

            // 3. TARGETED AUTO-PUBLISH (Only publish the merged files)
            for (const file of changedFiles) {
              const astroFilePath = path.join('frontend-repo/src/data/blog', file.replace('database-repo/', ''));
              
              if (fs.existsSync(astroFilePath)) {
                 let content = fs.readFileSync(astroFilePath, 'utf8');
                 
                 // Safely flip the draft status for THIS file only
                 content = content.replace(/draft:\s*true/, 'draft: false');
                 fs.writeFileSync(astroFilePath, content);

                 // Extract issue tracking number
                 const issueMatch = content.match(/issue_number:\s*(\d+)/);
                 if (issueMatch) issuesToClose.add(parseInt(issueMatch[1]));
              }
            }

            // 4. COMMIT & PUSH TO ASTRO
            try {
              execSync('cd frontend-repo && git config user.name "Cyber Seed Soul Bot" && git config user.email "bot@cyberseedsoul.in" && git add . && git commit -m "feat: auto-sync and publish approved FOSS articles" && git push');
              console.log("✅ Successfully pushed mapped articles to Astro Core.");
            } catch (e) {
              console.log("ℹ️ No new changes to push to Astro Core.");
            }

            // 5. SECURE ISSUE CLOSURE (Only if Open)
            for (const issueNum of issuesToClose) {
               try {
                 const issueData = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNum
                 });

                 if (issueData.data.state === 'open') {
                    console.log(`🎉 Closing Issue #${issueNum}...`);
                    await github.rest.issues.createComment({
                      owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum,
                      body: `🎉 **Congratulations!** Your article has been officially approved and merged by our admins.\n\n🚀 The website is currently building. Your article will be live globally at [cyberseedsoul.in](https://cyberseedsoul.in) in approximately 2 minutes!\n\n*Closing this tracking issue.*`
                    });
                    
                    await github.rest.issues.update({
                      owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNum, 
                      state: 'closed', state_reason: 'completed'
                    });
                 } else {
                    console.log(`ℹ️ Issue #${issueNum} is already closed (Likely an article update). Skipping comment.`);
                 }
               } catch (e) {
                  console.log(`⚠️ Could not process issue #${issueNum}:`, e.message);
               }
            }
            console.log("🏁 BRIDGE COMPLETE.");