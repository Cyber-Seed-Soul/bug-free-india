name: 🚀 Request Article Workspace
description: Our bot will automatically build your sharded folder, copy the template, and provide your magic link.
title: "[Workspace]: <Your Article Title>"
labels: ["workspace-request"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Welcome, Author! 
        Fill out this form. Ignore the buttons at the bottom (Assignee, Labels, etc.) and just click the green **Create** button.
  
  - type: input
    id: author_name
    attributes:
      label: Your Public Display Name
      description: The name you want shown on the website (e.g., Prof. Sam).
      placeholder: Scientific Sam
    validations:
      required: true

  - type: input
    id: author_email
    attributes:
      label: Your Public Contact Email
      description: A public email address if you want readers to contact you (Optional).
      placeholder: sam@cyberseedsoul.in
    validations:
      required: false

  - type: input
    id: article_slug
    attributes:
      label: Article URL Slug
      description: Use lowercase letters and hyphens only (e.g., protecting-indian-citizen-data).
      placeholder: my-first-post
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Primary Category
      options:
        - Platform Engineering
        - Data Science
        - Cyber Security
        - Open Source
        - Motivation
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags (Comma Separated)
      description: You must provide at least one valid tag (e.g., DevOps, Architecture).
      placeholder: DevOps, Open Source
    validations:
      required: true