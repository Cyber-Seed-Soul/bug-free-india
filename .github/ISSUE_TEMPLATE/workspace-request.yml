name: 🚀 Request Article Workspace
description: Our bot will automatically build your sharded folder, copy the template, and provide your magic link.
title: "[Workspace]: <Your Article Title>"
labels: ["workspace-request"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Welcome, Author! 
        Fill out this form. Ignore the buttons at the bottom (Assignee, Labels) and just click the green **Create** button.
  
  - type: input
    id: author_name
    attributes:
      label: Your Public Display Name
      placeholder: Scientific Sam
    validations:
      required: true

  - type: input
    id: author_email
    attributes:
      label: Your Public Contact Email (Optional)
      description: Leave this blank if you do not want your email public.
      placeholder: sam@cyberseedsoul.in
    validations:
      required: false

  - type: input
    id: article_slug
    attributes:
      label: Article URL Slug
      description: Use lowercase letters and hyphens only (e.g., protecting-indian-citizen-data).
      placeholder: my-first-post
    validations:
      required: true

  - type: input
    id: category
    attributes:
      label: Primary Category
      description: You must type ONE valid category (e.g., Cybersecurity, Data Science).
      placeholder: Cybersecurity
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags (Comma Separated)
      description: Provide at least one valid tag (e.g., Privacy, Security).
      placeholder: Privacy, Security
    validations:
      required: true